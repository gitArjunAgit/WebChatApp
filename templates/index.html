<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>realm of the chungies</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            max-width: 1050px;
            margin: 0 auto;
            padding: 40px 20px;
            color: #f1f5f9;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 50%, #160b3b 0%, #0b0726 50%, #020010 100%);
            position: relative;
            overflow-x: hidden;
        }

        .stars-layer {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background-image:
                radial-gradient(1px 1px at 25px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 115px 190px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 210px 100px, #f6d365, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 340px 280px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 450px 420px, #fda085, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 50px 150px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 180px 300px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 280px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 390px 170px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 420px 330px, #fff, rgba(0,0,0,0));
            background-size: 300px 300px;
        }

        #entry-portal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(2, 0, 16, 0.9);
            backdrop-filter: blur(15px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        #entry-box {
            background: rgba(11, 7, 38, 0.9);
            padding: 40px;
            border-radius: 24px;
            border: 2px solid #a855f7;
            box-shadow: 0 0 50px rgba(168, 85, 247, 0.4);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        #entry-box h1 {
            color: #f6d365;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 0;
            text-shadow: 0 0 15px rgba(246, 211, 101, 0.5);
        }

        #entry-box p {
            color: #cbd5e1;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        #username-input, #color-picker {
            width: 85%;
            padding: 16px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            font-size: 1.1em;
            color: #fff;
            text-align: center;
        }

        #username-input:focus, #color-picker:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
        }

        #join-btn {
            width: 95%;
            padding: 16px;
            background: linear-gradient(135deg, #a855f7 0%, #fda085 100%);
            color: #fff;
            font-weight: 800;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 1.1em;
        }

        #main-layout {
            display: none;
            gap: 25px;
        }

        #chat-container {
            flex: 3;
            background: rgba(11, 7, 38, 0.8);
            padding: 30px;
            border-radius: 24px;
            border: 2px solid #f6d365;
            box-shadow: 0 0 35px rgba(168, 85, 247, 0.35);
            backdrop-filter: blur(8px);
        }

        #sidebar-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-height: 600px;
        }

        #ping-pong-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #a855f7 0%, #3b82f6 100%);
            border: none;
            color: white;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .side-box {
            background: rgba(11, 7, 38, 0.6);
            padding: 20px;
            border-radius: 24px;
            border: 2px solid rgba(246, 211, 101, 0.2);
            backdrop-filter: blur(8px);
            overflow-y: auto;
        }

        .side-box h3 {
            margin-top: 0;
            color: #f6d365;
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 12px;
        }

        .user-item {
            padding: 8px 12px;
            font-size: 0.9em;
            font-weight: bold;
            transition: background 0.3s;
            border-radius: 8px;
        }

        .user-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .typing-pill {
            background: rgba(255, 255, 255, 0.04);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 10px;
            font-size: 0.85em;
            border-left: 3px solid #f6d365;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.5; transform: scale(0.98); }
        }

        #status-bar {
            text-align: center;
            font-size: 0.8em;
            margin-bottom: 15px;
            color: #64748b;
            font-weight: bold;
        }

        h2 {
            margin-top: 0;
            color: #f6d365;
            font-weight: 900;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 2em;
            text-shadow: 0 0 15px rgba(246, 211, 101, 0.5);
        }

        #chat-box {
            height: 460px;
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .message-line {
            margin-bottom: 14px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            line-height: 1.5;
        }

        .timestamp {
            font-size: 0.75em;
            color: rgba(255, 255, 255, 0.4);
            margin-right: 10px;
            font-family: monospace;
        }

        .username {
            font-weight: 800;
            margin-right: 12px;
            font-size: 0.95em;
            letter-spacing: 0.5px;
        }

        #message-form {
            display: flex;
            gap: 15px;
        }

        #message-input {
            flex-grow: 1;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            font-size: 1em;
            color: #fff;
        }

        #message-input:focus {
            outline: none;
            border-color: #f6d365;
            box-shadow: 0 0 12px rgba(246, 211, 101, 0.4);
        }

        button {
            padding: 16px 24px;
            font-weight: 800;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.02);
        }

        #send-btn {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            color: #0c0822;
        }

        #clear-btn {
            background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%);
            color: #fff;
        }

        /* Expanded Arena Rules for Fullscreen coverage */
        #game-view {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000000;
            z-index: 500;
            overflow: hidden;
        }

        #game-arena-title {
            position: absolute;
            top: 25px; left: 50%;
            transform: translateX(-50%);
            color: #f6d365;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 2em;
            text-shadow: 0 0 15px rgba(246, 211, 101, 0.5);
            margin: 0;
            z-index: 510;
        }

        #pongCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #000000;
        }
    </style>
</head>
<body>

<div class="stars-layer"></div>

<div id="entry-portal">
    <div id="entry-box">
        <h1>Identify</h1>
        <p>Forge your display name and choose a cosmic frequency.</p>
        <form id="entry-form">
            <input type="text" id="username-input" placeholder="Enter display name..." required autocomplete="off" maxlength="20">
            <select id="color-picker">
                <option value="#FF6B6B">Nebula Pink</option>
                <option value="#1BFF9B">Aurora Mint</option>
                <option value="#FFD700">Star Gold</option>
                <option value="#A855F7">Cosmic Violet</option>
                <option value="#FB923C">Meteor Orange</option>
                <option value="#00D4FF">Galactic Blue</option>
                <option value="#FF00FF">Supernova Magenta</option>
                <option value="#ADFF2F">Comet Green</option>
                <option value="#FF4500">Solar Flare Red</option>
                <option value="#9370DB">Interstellar Purple</option>
            </select>
            <button type="submit" id="join-btn">Enter Domain</button>
        </form>
    </div>
</div>

<div id="main-layout">
    <div id="chat-container">
        <div id="status-bar">Connecting to the cosmos...</div>
        <h2>Arj Domain</h2>
        <div id="chat-box"></div>

        <form id="message-form">
            <input type="text" id="message-input" placeholder="Transmit your message to the cosmos..." required autocomplete="off">
            <button type="submit" id="send-btn">Send</button>
            <button type="button" id="clear-btn">Wipe</button>
        </form>
    </div>

    <div id="sidebar-panel">
        <button id="ping-pong-btn" onclick="socket.emit('toggle_queue')">Ping Pong (0/2)</button>
        <div class="side-box" style="flex: 1;">
            <h3>Active Spirits</h3>
            <div id="users-list"></div>
        </div>
        <div class="side-box" style="flex: 1;">
            <h3>Transmitting...</h3>
            <div id="typing-list"></div>
        </div>
    </div>
</div>

<div id="game-view">
    <h1 id="game-arena-title">Ping Pong 1v1</h1>
    <canvas id="pongCanvas"></canvas>
</div>

<script>
    const socket = io();
    const pingPongBtn = document.getElementById('ping-pong-btn');

    const entryPortal = document.getElementById('entry-portal');
    const entryForm = document.getElementById('entry-form');
    const usernameInput = document.getElementById('username-input');
    const colorPicker = document.getElementById('color-picker');
    const mainLayout = document.getElementById('main-layout');
    const chatBox = document.getElementById('chat-box');
    const messageForm = document.getElementById('message-form');
    const messageInput = document.getElementById('message-input');
    const clearBtn = document.getElementById('clear-btn');
    const statusBar = document.getElementById('status-bar');
    const typingList = document.getElementById('typing-list');
    const usersList = document.getElementById('users-list');

    // Fullscreen Dynamic Setup
    const canvas = document.getElementById('pongCanvas');
    const ctx = canvas.getContext('2d');

    let myUsername = "";
    let myColor = "";
    let typingTimeout;
    let crownsList = [];

    // Game Engine State Variables
    let matchConfiguration = null;
    let localPaddleY = 0;
    let remotePaddleY = 0;
    let gameStateBall = { x: 0.5, y: 0.5, dx: 0.005, dy: 0.003 };
    let matchScores = { p1: 0, p2: 0 };
    let activeGameLoopId = null;
    let isTimerRunning = false;
    let gameTimerValue = 3;
    const virtualWidth = 1200;
    const virtualHeight = 800;
    const paddleVirtualWidth = 15;
    const paddleVirtualHeight = 120;

    // Movement Tracker
    const keyboardState = { ArrowUp: false, ArrowDown: false };

    window.addEventListener('keydown', (e) => {
        if (e.key in keyboardState) {
            keyboardState[e.key] = true;
            e.preventDefault();
        }
    });

    window.addEventListener('keyup', (e) => {
        if (e.key in keyboardState) {
            keyboardState[e.key] = false;
        }
    });

    function resizeCanvasToViewport() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvasToViewport);

    socket.on('connect', () => {
        statusBar.textContent = "● You are connected to the domain";
        statusBar.style.color = "#4ade80";
        if (myUsername) {
            socket.emit('join_domain', { user: myUsername, color: myColor });
        }
    });

    socket.on('disconnect', () => {
        statusBar.textContent = "○ Disconnected - Reconnecting...";
        statusBar.style.color = "#f43f5e";
    });

    entryForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const enteredName = usernameInput.value.trim();
        if (enteredName) {
            myUsername = enteredName;
            myColor = colorPicker.value;
            socket.emit('join_domain', { user: myUsername, color: myColor });
            entryPortal.style.opacity = '0';
            setTimeout(() => {
                entryPortal.style.display = 'none';
                mainLayout.style.display = 'flex';
                messageInput.focus();
            }, 500);
        }
    });

    function appendMessage(data) {
        const msgLine = document.createElement('div');
        msgLine.className = 'message-line';

        const timeSpan = document.createElement('span');
        timeSpan.className = 'timestamp';
        timeSpan.textContent = data.time ? `[${data.time}]` : '';

        const nameSpan = document.createElement('span');
        nameSpan.className = 'username';

        // Show crown if applicable
        const hasCrown = crownsList.includes(data.user);
        nameSpan.textContent = (hasCrown ? "👑 " : "") + data.user + ":";
        nameSpan.style.color = data.color;

        const textSpan = document.createElement('span');
        const escapedMsg = data.msg.replace(/[&<>"']/g, m => "&#" + m.charCodeAt(0) + ";");
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        textSpan.innerHTML = escapedMsg.replace(urlRegex, '<a href="$1" target="_blank" style="color: #38bdf8; text-decoration: underline;">$1</a>');

        if (data.time) msgLine.appendChild(timeSpan);
        msgLine.appendChild(nameSpan);
        msgLine.appendChild(textSpan);
        chatBox.appendChild(msgLine);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    messageForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = messageInput.value.trim();
        if (text && myUsername !== "") {
            const currentTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            socket.emit('send_message', { msg: text, user: myUsername, color: myColor, time: currentTime });
            socket.emit('stop_typing', { user: myUsername });
            messageInput.value = '';
        }
    });

    messageInput.addEventListener('input', () => {
        if (myUsername !== "") {
            socket.emit('typing', { user: myUsername });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('stop_typing', { user: myUsername });
            }, 2000);
        }
    });

    socket.on('load_history', (history) => {
        chatBox.innerHTML = '';
        history.forEach(appendMessage);
    });

    socket.on('receive_message', (data) => {
        appendMessage(data);
    });

    socket.on('update_typing', (users) => {
        typingList.innerHTML = '';
        users.forEach(user => {
            if (user !== myUsername) {
                const div = document.createElement('div');
                div.className = 'typing-pill';
                div.textContent = `${user} is typing...`;
                typingList.appendChild(div);
            }
        });
    });

    socket.on('update_crowns', (winners) => {
        crownsList = winners;
    });

    socket.on('update_users', (users) => {
        usersList.innerHTML = '';
        users.forEach(u => {
            const div = document.createElement('div');
            div.className = 'user-item';
            const showCrown = crownsList.includes(u.user) ? " 👑" : "";
            div.innerHTML = `
                <span style="color: ${u.color}; margin-right: 8px;">●</span>
                <span style="color: white;">${u.user}${showCrown} ${u.user === myUsername ? '(You)' : ''}</span>
            `;
            usersList.appendChild(div);
        });
    });

    socket.on('queue_update', (data) => {
        if (data.count === 'full') {
            pingPongBtn.textContent = "Ping Pong (Full!)";
            pingPongBtn.style.background = "#ef4444";
        } else {
            pingPongBtn.textContent = `Ping Pong (${data.count}/2)`;
            pingPongBtn.style.background = "linear-gradient(135deg, #a855f7 0%, #3b82f6 100%)";
        }
    });

    socket.on('start_match', (data) => {
        matchConfiguration = data;
        resizeCanvasToViewport();
        mainLayout.style.display = 'none';
        document.getElementById('game-view').style.display = 'block';

        localPaddleY = (virtualHeight / 2) - (paddleVirtualHeight / 2);
        remotePaddleY = (virtualHeight / 2) - (paddleVirtualHeight / 2);
        matchScores = { p1: 0, p2: 0 };
        resetBallState();

        runPreMatchCountdown();
    });

    socket.on('receive_game_state', (data) => {
        remotePaddleY = data.paddleY;
        if (matchConfiguration && socket.id !== matchConfiguration.p1_sid) {
            gameStateBall.x = data.ballX;
            gameStateBall.y = data.ballY;
            matchScores = data.scores;
        }
    });

    socket.on('match_ended', () => {
        if (activeGameLoopId) {
            cancelAnimationFrame(activeGameLoopId);
            activeGameLoopId = null;
        }
        isTimerRunning = false;
        document.getElementById('game-view').style.display = 'none';
        mainLayout.style.display = 'flex';
    });

    function resetBallState() {
        gameStateBall.x = 0.5;
        gameStateBall.y = 0.5;
        gameStateBall.dx = (Math.random() > 0.5 ? 1 : -1) * 0.006;
        gameStateBall.dy = (Math.random() * 2 - 1) * 0.004;
    }

    function runPreMatchCountdown() {
        isTimerRunning = true;
        gameTimerValue = 3;

        const countdownInterval = setInterval(() => {
            if (gameTimerValue <= 0) {
                clearInterval(countdownInterval);
                isTimerRunning = false;
                beginMatchLoop();
            } else {
                gameTimerValue--;
            }
        }, 1000);

        renderCountdownScreen();
    }

    function renderCountdownScreen() {
        if (!isTimerRunning) return;

        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 90px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        let displayStr = gameTimerValue === 0 ? "GO!" : gameTimerValue;
        ctx.fillText(displayStr, canvas.width / 2, canvas.height / 2);

        requestAnimationFrame(renderCountdownScreen);
    }

    function beginMatchLoop() {
        if (activeGameLoopId) cancelAnimationFrame(activeGameLoopId);
        activeGameLoopId = requestAnimationFrame(processAndRenderGameFrame);
    }

    function processAndRenderGameFrame() {
        const isPlayer1 = socket.id === matchConfiguration.p1_sid;
        const speedMultiplier = 12;

        if (keyboardState.ArrowUp) {
            localPaddleY = Math.max(0, localPaddleY - speedMultiplier);
        }
        if (keyboardState.ArrowDown) {
            localPaddleY = Math.min(virtualHeight - paddleVirtualHeight, localPaddleY + speedMultiplier);
        }

        socket.emit('game_state_sync', {
            paddleY: localPaddleY,
            ballX: gameStateBall.x,
            ballY: gameStateBall.y,
            scores: matchScores
        });

        if (isPlayer1) {
            gameStateBall.x += gameStateBall.dx;
            gameStateBall.y += gameStateBall.dy;

            if (gameStateBall.y <= 0) {
                gameStateBall.y = 0;
                gameStateBall.dy = -gameStateBall.dy;
            }
            if (gameStateBall.y >= 1.0) {
                gameStateBall.y = 1.0;
                gameStateBall.dy = -gameStateBall.dy;
            }

            const p1Top = localPaddleY / virtualHeight;
            const p1Bottom = (localPaddleY + paddleVirtualHeight) / virtualHeight;
            const p1RightBound = 35 / virtualWidth;

            if (gameStateBall.x <= p1RightBound && gameStateBall.x >= p1RightBound - 0.01) {
                if (gameStateBall.y >= p1Top && gameStateBall.y <= p1Bottom) {
                    gameStateBall.dx = Math.abs(gameStateBall.dx) * 1.05;
                    gameStateBall.x = p1RightBound;
                }
            }

            const p2Top = remotePaddleY / virtualHeight;
            const p2Bottom = (remotePaddleY + paddleVirtualHeight) / virtualHeight;
            const p2LeftBound = (virtualWidth - 35) / virtualWidth;

            if (gameStateBall.x >= p2LeftBound && gameStateBall.x <= p2LeftBound + 0.01) {
                if (gameStateBall.y >= p2Top && gameStateBall.y <= p2Bottom) {
                    gameStateBall.dx = -Math.abs(gameStateBall.dx) * 1.05;
                    gameStateBall.x = p2LeftBound;
                }
            }

            if (gameStateBall.x < 0) {
                matchScores.p2++;
                if (matchScores.p2 >= 5) {
                    socket.emit('match_over', { winner: matchConfiguration.p2_name });
                    return;
                }
                resetBallState();
            } else if (gameStateBall.x > 1.0) {
                matchScores.p1++;
                if (matchScores.p1 >= 5) {
                    socket.emit('match_over', { winner: matchConfiguration.p1_name });
                    return;
                }
                resetBallState();
            }
        }

        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const widthScale = canvas.width / virtualWidth;
        const heightScale = canvas.height / virtualHeight;

        ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
        ctx.lineWidth = 4;
        ctx.setLineDash([15, 15]);
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, 0);
        ctx.lineTo(canvas.width / 2, canvas.height);
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.fillStyle = '#ffffff';
        ctx.font = '900 64px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(matchScores.p1, canvas.width * 0.25, 100);
        ctx.fillText(matchScores.p2, canvas.width * 0.75, 100);

        const leftPaddleColor = isPlayer1 ? matchConfiguration.p1_color : matchConfiguration.p2_color;
        const rightPaddleColor = isPlayer1 ? matchConfiguration.p2_color : matchConfiguration.p1_color;
        const renderLeftY = isPlayer1 ? localPaddleY : remotePaddleY;
        const renderRightY = isPlayer1 ? remotePaddleY : localPaddleY;

        ctx.fillStyle = leftPaddleColor;
        ctx.fillRect(20 * widthScale, renderLeftY * heightScale, paddleVirtualWidth * widthScale, paddleVirtualHeight * heightScale);

        ctx.fillStyle = rightPaddleColor;
        ctx.fillRect((virtualWidth - 20 - paddleVirtualWidth) * widthScale, renderRightY * heightScale, paddleVirtualWidth * widthScale, paddleVirtualHeight * heightScale);

        ctx.fillStyle = '#ffffff';
        const ballSize = 14;
        ctx.fillRect(
            (gameStateBall.x * virtualWidth) * widthScale - (ballSize / 2),
            (gameStateBall.y * virtualHeight) * heightScale - (ballSize / 2),
            ballSize,
            ballSize
        );

        activeGameLoopId = requestAnimationFrame(processAndRenderGameFrame);
    }

    clearBtn.addEventListener('click', () => {
        socket.emit('clear_chat');
    });

    socket.on('chat_cleared', () => {
        chatBox.innerHTML = '';
    });

    setInterval(() => {
        socket.emit('ping');
    }, 300000);
</script>
</body>
