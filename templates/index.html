<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>realm of the chungies</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Roboto, sans-serif; max-width: 750px; margin: 0 auto; padding: 40px 20px; color: #f1f5f9; min-height: 100vh; background: radial-gradient(circle at 50% 50%, #160b3b 0%, #0b0726 50%, #020010 100%); position: relative; }
        .stars-layer { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1; background-image: radial-gradient(1px 1px at 25px 40px, #fff, rgba(0,0,0,0)), radial-gradient(1.5px 1.5px at 115px 190px, #fff, rgba(0,0,0,0)), radial-gradient(2px 2px at 210px 100px, #f6d365, rgba(0,0,0,0)); background-size: 300px 300px; }

        #entry-portal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(2, 0, 16, 0.9); z-index: 100; display: flex; justify-content: center; align-items: center; }
        #entry-box { background: rgba(11, 7, 38, 0.9); padding: 40px; border-radius: 24px; border: 2px solid #a855f7; text-align: center; width: 300px; }
        #color-picker { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 20px 0; }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-dot.active { border-color: white; transform: scale(1.2); }

        #chat-container { background: rgba(11, 7, 38, 0.8); padding: 30px; border-radius: 24px; border: 2px solid #f6d365; display: none; }
        #status-bar { text-align: center; font-size: 0.8em; margin-bottom: 10px; color: #64748b; }
        #chat-box { height: 400px; overflow-y: auto; padding: 20px; background: rgba(0,0,0,0.5); border-radius: 16px; margin-bottom: 15px; }
        .message-line { margin-bottom: 10px; }
        .username { font-weight: 800; cursor: pointer; }

        input, button { padding: 12px; border-radius: 10px; border: none; }
        #send-btn { background: #f6d365; color: #000; }
        #clear-btn { background: #ef4444; color: #fff; }
    </style>
</head>
<body>

<div class="stars-layer"></div>

<div id="entry-portal">
    <div id="entry-box">
        <h1>Identify</h1>
        <input type="text" id="username-input" placeholder="Display name..." maxlength="20">
        <div id="color-picker"></div>
        <button id="join-btn">Enter Domain</button>
    </div>
</div>

<div id="chat-container">
    <div id="status-bar">Connecting...</div>
    <div id="chat-box"></div>
    <form id="message-form" style="display:flex; gap:10px;">
        <input type="text" id="message-input" style="flex-grow:1;" placeholder="Message..." required autocomplete="off">
        <button type="submit" id="send-btn">Send</button>
        <button type="button" id="clear-btn">Wipe</button>
    </form>
    <button id="change-id-btn" style="margin-top:10px; background:transparent; color:#94a3b8; border:1px solid #94a3b8;">Change Identity</button>
</div>

<script>
    const socket = io();
    const colors = ["#f6d365", "#38bdf8", "#4ade80", "#f43f5e", "#c084fc", "#fb923c", "#22d3ee", "#e879f9", "#fb7185", "#a3e635"];
    let myColor = localStorage.getItem('myColor') || colors[0];
    let myUsername = localStorage.getItem('myUsername') || "";

    const colorPicker = document.getElementById('color-picker');
    colors.forEach(c => {
        const div = document.createElement('div');
        div.className = 'color-dot' + (c === myColor ? ' active' : '');
        div.style.background = c;
        div.onclick = () => { myColor = c; document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active')); div.classList.add('active'); };
        colorPicker.appendChild(div);
    });

    document.getElementById('join-btn').onclick = () => {
        const name = document.getElementById('username-input').value.trim();
        if (name) {
            myUsername = name;
            localStorage.setItem('myUsername', myUsername);
            localStorage.setItem('myColor', myColor);
            document.getElementById('entry-portal').style.display = 'none';
            document.getElementById('chat-container').style.display = 'block';
        }
    };

    document.getElementById('change-id-btn').onclick = () => { location.reload(); };

    // Socket logic
    socket.on('connect', () => document.getElementById('status-bar').textContent = "● Connected");
    socket.on('receive_message', (data) => {
        const div = document.createElement('div'); div.className = 'message-line';
        div.innerHTML = `<span class="username" style="color:${data.color}">${data.user}:</span> ${data.msg}`;
        document.getElementById('chat-box').appendChild(div);
    });

    document.getElementById('message-form').onsubmit = (e) => {
        e.preventDefault();
        const msg = document.getElementById('message-input').value;
        socket.emit('send_message', { msg, user: myUsername, color: myColor });
        document.getElementById('message-input').value = '';
    };

    if (myUsername) {
        document.getElementById('username-input').value = myUsername;
    }
</script>
</body>
</html>
