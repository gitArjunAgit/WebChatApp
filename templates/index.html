<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>realm of the chungies</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            max-width: 1050px;
            margin: 0 auto;
            padding: 40px 20px;
            color: #f1f5f9;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 50%, #160b3b 0%, #0b0726 50%, #020010 100%);
            position: relative;
            overflow-x: hidden;
        }

        .audio-control {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 200;
            background: rgba(11, 7, 38, 0.8);
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid #f6d365;
            color: #f6d365;
            font-size: 0.8em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cosmos-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .floating-text {
            position: absolute;
            color: rgba(255, 255, 255, 0.15);
            font-family: 'Courier New', monospace;
            font-size: 1.8em;
            animation: drift 60s linear infinite;
        }

        .planet {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #4a4a4a, #1a1a1a);
            animation: rotate 120s linear infinite;
            opacity: 0.4;
        }

        @keyframes drift {
            from { transform: translateY(100vh) rotate(0deg); }
            to { transform: translateY(-20vh) rotate(360deg); }
        }

        @keyframes rotate {
            from { transform: translate(0, 0); }
            to { transform: translate(100vw, -100vh); }
        }

        .stars-layer {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -2;
            background-image:
                radial-gradient(1px 1px at 25px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 115px 190px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 210px 100px, #f6d365, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 340px 280px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 450px 420px, #fda085, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 50px 150px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 180px 300px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 280px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 390px 170px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 420px 330px, #fff, rgba(0,0,0,0));
            background-size: 300px 300px;
        }

        #entry-portal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(2, 0, 16, 0.9);
            backdrop-filter: blur(15px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        #entry-box {
            background: rgba(11, 7, 38, 0.9);
            padding: 40px;
            border-radius: 24px;
            border: 2px solid #a855f7;
            box-shadow: 0 0 50px rgba(168, 85, 247, 0.4);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        #entry-box h1 {
            color: #f6d365;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 0;
            text-shadow: 0 0 15px rgba(246, 211, 101, 0.5);
        }

        #entry-box p {
            color: #cbd5e1;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        #username-input, #color-picker {
            width: 85%;
            padding: 16px;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            font-size: 1.1em;
            color: #fff;
            text-align: center;
        }

        #username-input:focus, #color-picker:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.5);
        }

        #join-btn {
            width: 95%;
            padding: 16px;
            background: linear-gradient(135deg, #a855f7 0%, #fda085 100%);
            color: #fff;
            font-weight: 800;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 1.1em;
        }

        #main-layout {
            display: none;
            gap: 25px;
        }

        #chat-container {
            flex: 3;
            background: rgba(11, 7, 38, 0.8);
            padding: 30px;
            border-radius: 24px;
            border: 2px solid #f6d365;
            box-shadow: 0 0 35px rgba(168, 85, 247, 0.35);
            backdrop-filter: blur(8px);
        }

        #sidebar-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-height: 600px;
        }

        .side-box {
            background: rgba(11, 7, 38, 0.6);
            padding: 20px;
            border-radius: 24px;
            border: 2px solid rgba(246, 211, 101, 0.2);
            backdrop-filter: blur(8px);
            overflow-y: auto;
        }

        .side-box h3 {
            margin-top: 0;
            color: #f6d365;
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 12px;
        }

        .user-item {
            padding: 8px 12px;
            font-size: 0.9em;
            font-weight: bold;
            transition: background 0.3s;
            border-radius: 8px;
        }

        .user-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .typing-pill {
            background: rgba(255, 255, 255, 0.04);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 10px;
            font-size: 0.85em;
            border-left: 3px solid #f6d365;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.5; transform: scale(0.98); }
        }

        #status-bar {
            text-align: center;
            font-size: 0.8em;
            margin-bottom: 15px;
            color: #64748b;
            font-weight: bold;
        }

        h2 {
            margin-top: 0;
            color: #f6d365;
            font-weight: 900;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 2em;
            text-shadow: 0 0 15px rgba(246, 211, 101, 0.5);
        }

        #chat-box {
            height: 460px;
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .message-line {
            margin-bottom: 14px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            line-height: 1.5;
        }

        .timestamp {
            font-size: 0.75em;
            color: rgba(255, 255, 255, 0.4);
            margin-right: 10px;
            font-family: monospace;
        }

        .username {
            font-weight: 800;
            margin-right: 12px;
            font-size: 0.95em;
            letter-spacing: 0.5px;
        }

        #message-form {
            display: flex;
            gap: 15px;
        }

        #message-input {
            flex-grow: 1;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            font-size: 1em;
            color: #fff;
        }

        #message-input:focus {
            outline: none;
            border-color: #f6d365;
            box-shadow: 0 0 12px rgba(246, 211, 101, 0.4);
        }

        button {
            padding: 16px 24px;
            font-weight: 800;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.02);
        }

        #send-btn {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            color: #0c0822;
        }

        #clear-btn {
            background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%);
            color: #fff;
        }

        /* Pong Arena Styles */
        #pong-arena {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #020010;
            z-index: 9999;
            color: #f6d365;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: auto;
        }

        #pong-game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
        }

        #pong-canvas {
            background: #0b0726;
            border: 3px solid #f6d365;
            box-shadow: 0 0 30px rgba(246, 211, 101, 0.5);
            display: block;
            max-width: 95vw;
            max-height: 80vh;
        }

        .pong-info {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 1200px;
            color: #f6d365;
            font-weight: bold;
            font-size: 1.5em;
            text-align: center;
        }

        .pong-info-section {
            flex: 1;
        }

        .pong-score {
            font-size: 2.5em;
            color: #1BFF9B;
            margin-top: 5px;
        }

        #exit-pong-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 20px;
        }

        #exit-pong-btn:hover {
            transform: scale(1.05);
        }

        .game-ended-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 0, 16, 0.95);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .game-ended-box {
            background: rgba(11, 7, 38, 0.9);
            padding: 40px;
            border-radius: 24px;
            border: 2px solid #a855f7;
            box-shadow: 0 0 50px rgba(168, 85, 247, 0.4);
            text-align: center;
            max-width: 500px;
        }

        .game-ended-box h1 {
            color: #1BFF9B;
            font-size: 2.5em;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .game-ended-box p {
            color: #cbd5e1;
            font-size: 1.2em;
            margin: 10px 0;
        }

        .final-score {
            font-size: 1.8em;
            color: #FFD700;
            margin: 20px 0;
        }

        .crown-badge {
            display: inline-block;
            font-size: 1.5em;
            margin-left: 5px;
            animation: bounce 0.5s ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

<audio id="bg-music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div class="audio-control">
    <label for="music-toggle">♪ Music</label>
    <input type="checkbox" id="music-toggle">
</div>

<div class="cosmos-layer">
    <div class="floating-text" style="top: 5%; left: 5%;">e^{iπ} + 1 = 0</div>
    <div class="floating-text" style="top: 15%; left: 85%;">F = G(m₁m₂)/r²</div>
    <div class="floating-text" style="top: 25%; left: 30%;">∑(1/2ⁿ) = 2</div>
    <div class="floating-text" style="top: 40%; left: 60%;">ψ(x,t)</div>
    <div class="floating-text" style="top: 55%; left: 10%;">E = mc²</div>
    <div class="floating-text" style="top: 70%; left: 90%;">∇⋅E = ρ/ε₀</div>
    <div class="floating-text" style="top: 85%; left: 40%;">∫eˣdx = eˣ + C</div>
    <div class="floating-text" style="top: 95%; left: 75%;">a² + b² = c²</div>

    <div class="planet" style="width: 120px; height: 120px; top: 10%; left: 20%; background: #3b82f6;"></div>
    <div class="planet" style="width: 80px; height: 80px; top: 30%; left: 70%; background: #f6d365;"></div>
    <div class="planet" style="width: 60px; height: 60px; top: 60%; left: 80%; background: #ef4444;"></div>
    <div class="planet" style="width: 150px; height: 150px; top: 80%; left: 15%; background: #10b981;"></div>
    <div class="planet" style="width: 40px; height: 40px; top: 50%; left: 45%; background: #a855f7;"></div>
    <div class="planet" style="width: 90px; height: 90px; top: 20%; left: 90%; background: #fb923c;"></div>
</div>

<div class="stars-layer"></div>

<div id="entry-portal">
    <div id="entry-box">
        <h1>Identify</h1>
        <p>Forge your display name and choose a cosmic frequency.</p>
        <form id="entry-form">
            <input type="text" id="username-input" placeholder="Enter display name..." required autocomplete="off" maxlength="20">
            <select id="color-picker">
                <option value="#FF6B6B">Nebula Pink</option>
                <option value="#1BFF9B">Aurora Mint</option>
                <option value="#FFD700">Star Gold</option>
                <option value="#A855F7">Cosmic Violet</option>
                <option value="#FB923C">Meteor Orange</option>
                <option value="#00D4FF">Galactic Blue</option>
                <option value="#FF00FF">Supernova Magenta</option>
                <option value="#ADFF2F">Comet Green</option>
                <option value="#FF4500">Solar Flare Red</option>
                <option value="#9370DB">Interstellar Purple</option>
            </select>
            <button type="submit" id="join-btn">Enter Domain</button>
        </form>
    </div>
</div>

<div id="main-layout">
    <div id="chat-container">
        <div id="status-bar">Connecting to the cosmos...</div>
        <h2>Realm of the Chungies</h2>
        <div id="chat-box"></div>

        <form id="message-form">
            <input type="text" id="message-input" placeholder="Transmit your message to the cosmos..." required autocomplete="off">
            <button type="submit" id="send-btn">Send</button>
            <button type="button" id="clear-btn">Wipe</button>
        </form>
    </div>

    <div id="sidebar-panel">
        <button type="button" id="join-pong-btn" style="width: 100%; padding: 12px; margin-bottom: 20px; background: #a855f7; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; text-transform: uppercase;">
            Join Cosmic Pong
        </button>
        <div class="side-box" style="flex: 1;">
            <h3>Active Spirits</h3>
            <div id="users-list"></div>
        </div>
        <div class="side-box" style="flex: 1;">
            <h3>Transmitting...</h3>
            <div id="typing-list"></div>
        </div>
    </div>
</div>

<div id="pong-arena">
    <div id="pong-game-container">
        <h1>⚔️ Cosmic Pong Arena ⚔️</h1>
        <canvas id="pong-canvas" width="1200" height="600"></canvas>
        <div class="pong-info">
            <div class="pong-info-section">
                <div id="pong-p1-name">Player 1</div>
                <div class="pong-score" id="pong-p1-score">0</div>
            </div>
            <div class="pong-info-section">
                <div style="font-size: 1.5em; color: #FFD700;">VS</div>
            </div>
            <div class="pong-info-section">
                <div id="pong-p2-name">Player 2</div>
                <div class="pong-score" id="pong-p2-score">0</div>
            </div>
        </div>
        <button id="exit-pong-btn">Exit Arena</button>
    </div>
</div>

<script>
    const socket = io();
    const musicToggle = document.getElementById('music-toggle');
    const bgMusic = document.getElementById('bg-music');

    // Request notification permission on load
    if ("Notification" in window) {
        Notification.requestPermission();
    }

    musicToggle.addEventListener('change', () => {
        if (musicToggle.checked) {
            bgMusic.play().catch(e => console.log("User interaction required to play audio."));
        } else {
            bgMusic.pause();
        }
    });

    const entryPortal = document.getElementById('entry-portal');
    const entryForm = document.getElementById('entry-form');
    const usernameInput = document.getElementById('username-input');
    const colorPicker = document.getElementById('color-picker');
    const mainLayout = document.getElementById('main-layout');
    const chatBox = document.getElementById('chat-box');
    const messageForm = document.getElementById('message-form');
    const messageInput = document.getElementById('message-input');
    const clearBtn = document.getElementById('clear-btn');
    const statusBar = document.getElementById('status-bar');
    const typingList = document.getElementById('typing-list');
    const usersList = document.getElementById('users-list');

    // Pong elements
    const joinPongBtn = document.getElementById('join-pong-btn');
    const pongArena = document.getElementById('pong-arena');
    const pongCanvas = document.getElementById('pong-canvas');
    const ctx = pongCanvas.getContext('2d');
    const exitPongBtn = document.getElementById('exit-pong-btn');

    let myUsername = "";
    let myColor = "";
    let typingTimeout;
    let currentGameId = null;
    let playerNumber = null;
    let currentGameState = null;
    let keysPressed = {};
    let lastWinner = null;

    // Load saved session from localStorage
    function loadSession() {
        const saved = localStorage.getItem('userSession');
        if (saved) {
            try {
                const session = JSON.parse(saved);
                myUsername = session.username;
                myColor = session.color;
                return true;
            } catch (e) {
                return false;
            }
        }
        return false;
    }

    // Save session to localStorage
    function saveSession() {
        localStorage.setItem('userSession', JSON.stringify({
            username: myUsername,
            color: myColor
        }));
    }

    // Clear session
    function clearSession() {
        localStorage.removeItem('userSession');
    }

    socket.on('connect', () => {
        statusBar.textContent = "● You are connected to the domain";
        statusBar.style.color = "#4ade80";
        
        // Try to restore session
        if (loadSession()) {
            socket.emit('join_domain', { user: myUsername, color: myColor });
            entryPortal.style.display = 'none';
            mainLayout.style.display = 'flex';
        }
    });

    socket.on('disconnect', () => {
        statusBar.textContent = "○ Disconnected - Reconnecting...";
        statusBar.style.color = "#f43f5e";
    });

    entryForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const enteredName = usernameInput.value.trim();
        if (enteredName) {
            myUsername = enteredName;
            myColor = colorPicker.value;
            saveSession();
            socket.emit('join_domain', { user: myUsername, color: myColor });
            entryPortal.style.opacity = '0';
            setTimeout(() => {
                entryPortal.style.display = 'none';
                mainLayout.style.display = 'flex';
                messageInput.focus();
            }, 500);
        }
    });

    function appendMessage(data) {
        const msgLine = document.createElement('div');
        msgLine.className = 'message-line';

        const timeSpan = document.createElement('span');
        timeSpan.className = 'timestamp';
        timeSpan.textContent = data.time ? `[${data.time}]` : '';

        const nameSpan = document.createElement('span');
        nameSpan.className = 'username';
        let nameText = data.user + ":";
        
        // Add crown if this user won the last game
        if (lastWinner && data.user === lastWinner) {
            nameText += ' <span class="crown-badge">👑</span>';
        }
        
        nameSpan.innerHTML = nameText;
        nameSpan.style.color = data.color;

        const textSpan = document.createElement('span');
        const escapedMsg = data.msg.replace(/[&<>"']/g, m => "&#" + m.charCodeAt(0) + ";");
        const urlRegex = /(https?:\/\/[^\s]+)/g;
        textSpan.innerHTML = escapedMsg.replace(urlRegex, '<a href="$1" target="_blank" style="color: #38bdf8; text-decoration: underline;">$1</a>');

        if (data.time) msgLine.appendChild(timeSpan);
        msgLine.appendChild(nameSpan);
        msgLine.appendChild(textSpan);
        chatBox.appendChild(msgLine);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    messageForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = messageInput.value.trim();
        if (text && myUsername !== "") {
            const currentTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            socket.emit('send_message', { msg: text, user: myUsername, color: myColor, time: currentTime });
            socket.emit('stop_typing', { user: myUsername });
            messageInput.value = '';
        }
    });

    messageInput.addEventListener('input', () => {
        if (myUsername !== "") {
            socket.emit('typing', { user: myUsername });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('stop_typing', { user: myUsername });
            }, 2000);
        }
    });

    socket.on('load_history', (history) => {
        chatBox.innerHTML = '';
        history.forEach(appendMessage);
    });

    socket.on('receive_message', (data) => {
        appendMessage(data);

        // Notification logic
        if (data.msg.includes('@' + myUsername) && document.hidden) {
            new Notification("New mention in Domain", {
                body: `${data.user}: ${data.msg}`
            });
        }
    });

    socket.on('update_typing', (users) => {
        typingList.innerHTML = '';
        users.forEach(user => {
            if (user !== myUsername) {
                const div = document.createElement('div');
                div.className = 'typing-pill';
                div.textContent = `${user} is typing...`;
                typingList.appendChild(div);
            }
        });
    });

    socket.on('update_users', (users) => {
        usersList.innerHTML = '';
        users.forEach(u => {
            const div = document.createElement('div');
            div.className = 'user-item';
            let userDisplay = u.user;
            if (lastWinner && u.user === lastWinner) {
                userDisplay += ' 👑';
            }
            div.innerHTML = `
                <span style="color: ${u.color}; margin-right: 8px;">●</span>
                <span style="color: white;">${userDisplay} ${u.user === myUsername ? '(You)' : ''}</span>
            `;
            usersList.appendChild(div);
        });
    });

    clearBtn.addEventListener('click', () => {
        socket.emit('clear_chat');
    });

    socket.on('chat_cleared', () => {
        chatBox.innerHTML = '';
    });

    // ============ PONG GAME LOGIC ============

    joinPongBtn.addEventListener('click', () => {
        socket.emit('join_pong', { user: myUsername, color: myColor });
    });

    socket.on('pong_queue_update', (data) => {
        if (data.count === 1) {
            joinPongBtn.textContent = "Cosmic Pong (1/2)";
            joinPongBtn.style.background = "#fb923c";
        } else {
            joinPongBtn.textContent = "Join Cosmic Pong";
            joinPongBtn.style.background = "#a855f7";
        }
    });

    socket.on('game_started', (data) => {
        console.log('Game started:', data);
        currentGameId = data.game_id;
        playerNumber = data.player_number;
        
        const p1Name = playerNumber === 1 ? myUsername : data.opponent;
        const p2Name = playerNumber === 2 ? myUsername : data.opponent;
        
        document.getElementById('pong-p1-name').textContent = p1Name;
        document.getElementById('pong-p2-name').textContent = p2Name;
        
        mainLayout.style.display = 'none';
        pongArena.style.display = 'flex';
        
        // Request initial game state
        socket.emit('request_game_state', { game_id: currentGameId });
        
        // Start listening to keyboard input
        document.addEventListener('keydown', handleKeyDown);
        document.addEventListener('keyup', handleKeyUp);
    });

    socket.on('game_state_update', (state) => {
        currentGameState = state;
        document.getElementById('pong-p1-score').textContent = state.p1.score;
        document.getElementById('pong-p2-score').textContent = state.p2.score;
        drawGame(state);
    });

    socket.on('game_ended', (data) => {
        document.removeEventListener('keydown', handleKeyDown);
        document.removeEventListener('keyup', handleKeyUp);
        
        const reason = data.reason || 'finished';
        if (reason === 'opponent_disconnected') {
            lastWinner = myUsername;
            showGameEndedOverlay('Opponent Disconnected!', 'You win by default!', '5', '0');
        } else {
            lastWinner = data.winner_name;
            const playerWon = (data.winner === playerNumber);
            showGameEndedOverlay(
                playerWon ? '🎉 YOU WIN! 🎉' : '😢 You Lost',
                `${data.winner_name} 👑 wins!`,
                data.p1_score,
                data.p2_score
            );
        }
    });

    function handleKeyDown(e) {
        keysPressed[e.key] = true;
        
        if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
            e.preventDefault();
            socket.emit('paddle_move', {
                game_id: currentGameId,
                player_number: playerNumber,
                direction: 'up'
            });
        } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
            e.preventDefault();
            socket.emit('paddle_move', {
                game_id: currentGameId,
                player_number: playerNumber,
                direction: 'down'
            });
        }
    }

    function handleKeyUp(e) {
        if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'w' || e.key === 'W' || e.key === 's' || e.key === 'S') {
            e.preventDefault();
            socket.emit('paddle_move', {
                game_id: currentGameId,
                player_number: playerNumber,
                direction: 'stop'
            });
        }
    }

    function drawGame(state) {
        // Clear canvas
        ctx.fillStyle = '#0b0726';
        ctx.fillRect(0, 0, pongCanvas.width, pongCanvas.height);

        // Draw center line
        ctx.strokeStyle = 'rgba(246, 211, 101, 0.3)';
        ctx.setLineDash([10, 10]);
        ctx.beginPath();
        ctx.moveTo(state.width / 2, 0);
        ctx.lineTo(state.width / 2, state.height);
        ctx.stroke();
        ctx.setLineDash([]);

        // Draw paddles with player colors
        ctx.fillStyle = state.p1.color;
        ctx.fillRect(0, state.p1.y, state.p1.width, state.p1.height);
        
        ctx.fillStyle = state.p2.color;
        ctx.fillRect(state.width - state.p2.width, state.p2.y, state.p2.width, state.p2.height);

        // Draw ball
        ctx.fillStyle = '#f6d365';
        ctx.beginPath();
        ctx.arc(state.ball.x, state.ball.y, state.ball.radius, 0, Math.PI * 2);
        ctx.fill();

        // Draw glow effect on ball
        ctx.strokeStyle = 'rgba(246, 211, 101, 0.5)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(state.ball.x, state.ball.y, state.ball.radius + 5, 0, Math.PI * 2);
        ctx.stroke();
    }

    exitPongBtn.addEventListener('click', () => {
        document.removeEventListener('keydown', handleKeyDown);
        document.removeEventListener('keyup', handleKeyUp);
        
        currentGameId = null;
        playerNumber = null;
        currentGameState = null;
        
        pongArena.style.display = 'none';
        mainLayout.style.display = 'flex';
    });

    function showGameEndedOverlay(title, message, p1Score, p2Score) {
        const overlay = document.createElement('div');
        overlay.className = 'game-ended-overlay';
        overlay.innerHTML = `
            <div class="game-ended-box">
                <h1>${title}</h1>
                <p>${message}</p>
                <div class="final-score">${p1Score} - ${p2Score}</div>
                <button onclick="location.reload()" style="padding: 12px 24px; background: linear-gradient(135deg, #a855f7 0%, #fda085 100%); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; text-transform: uppercase; width: 100%;">
                    Return to Realm
                </button>
            </div>
        `;
        pongArena.appendChild(overlay);
    }

    setInterval(() => {
        socket.emit('ping');
    }, 300000);
</script>
</body>
</html>
