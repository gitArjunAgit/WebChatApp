<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>realm of the chungies</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            max-width: 750px;
            margin: 0 auto;
            padding: 40px 20px;
            color: #f1f5f9;
            min-height: 100vh;
            background: radial-gradient(circle at 50% 50%, #160b3b 0%, #0b0726 50%, #020010 100%);
            position: relative;
            overflow-x: hidden;
        }

        .stars-layer {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background-image:
                radial-gradient(1px 1px at 25px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 115px 190px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 210px 100px, #f6d365, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 340px 280px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 450px 420px, #fda085, rgba(0,0,0,0));
            background-size: 500px 500px;
        }

        #chat-container {
            background: rgba(11, 7, 38, 0.8);
            padding: 30px;
            border-radius: 24px;
            border: 2px solid #f6d365;
            box-shadow: 0 0 35px rgba(168, 85, 247, 0.35);
            backdrop-filter: blur(8px);
        }

        h2 {
            margin-top: 0;
            color: #f6d365;
            font-weight: 900;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 2em;
            text-shadow: 0 0 15px rgba(246, 211, 101, 0.5);
        }

        #chat-box {
            height: 460px;
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .message-line {
            margin-bottom: 14px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            line-height: 1.5;
        }

        .username {
            font-weight: 800;
            margin-right: 12px;
            font-size: 0.95em;
            letter-spacing: 0.5px;
        }

        #message-form {
            display: flex;
            gap: 15px;
        }

        #message-input {
            flex-grow: 1;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            font-size: 1em;
            color: #fff;
        }

        #message-input:focus {
            outline: none;
            border-color: #f6d365;
            box-shadow: 0 0 12px rgba(246, 211, 101, 0.4);
        }

        button {
            padding: 16px 24px;
            font-weight: 800;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.02);
        }

        #send-btn {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            color: #0c0822;
        }

        #clear-btn {
            background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%);
            color: #fff;
        }
    </style>
</head>
<body>

<div class="stars-layer"></div>

<div id="chat-container">
    <h2>Arj Domain</h2>
    <div id="chat-box"></div>

    <form id="message-form">
        <input type="text" id="message-input" placeholder="Transmit your message to the cosmos..." required autocomplete="off">
        <button type="submit" id="send-btn">Send</button>
        <button type="button" id="clear-btn">Wipe</button>
    </form>
</div>

<script>
    const socket = io();
    const chatBox = document.getElementById('chat-box');
    const messageForm = document.getElementById('message-form');
    const messageInput = document.getElementById('message-input');
    const clearBtn = document.getElementById('clear-btn');

    const customUsers = [
        "timmy tuff knuckles",
        "dangerous dan",
        "treacherous timmy",
        "red zone ralph",
        "rise of the chungies"
    ];

    const myUsername = customUsers[Math.floor(Math.random() * customUsers.length)];
    const brightColors = ["#f6d365", "#38bdf8", "#4ade80", "#f43f5e", "#c084fc", "#fb923c"];
    const myColor = brightColors[Math.floor(Math.random() * brightColors.length)];

    // Helper to draw messages safely
    function appendMessage(data) {
        const msgLine = document.createElement('div');
        msgLine.className = 'message-line';

        const nameSpan = document.createElement('span');
        nameSpan.className = 'username';
        nameSpan.textContent = data.user + ":";
        nameSpan.style.color = data.color;

        const textSpan = document.createElement('span');
        textSpan.textContent = data.msg;

        msgLine.appendChild(nameSpan);
        msgLine.appendChild(textSpan);
        chatBox.appendChild(msgLine);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    messageForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const text = messageInput.value.trim();
        if (text) {
            socket.emit('send_message', { msg: text, user: myUsername, color: myColor });
            messageInput.value = '';
        }
    });

    // Receive historical messages when joining
    socket.on('load_history', (history) => {
        chatBox.innerHTML = '';
        history.forEach(appendMessage);
    });

    // Receive a single new message
    socket.on('receive_message', (data) => {
        appendMessage(data);
    });

    // Tell the server to wipe everything
    clearBtn.addEventListener('click', () => {
        socket.emit('clear_chat');
    });

    // Listen for the wipe command from the server
    socket.on('chat_cleared', () => {
        chatBox.innerHTML = '';
    });
</script>
</body>
</html>
